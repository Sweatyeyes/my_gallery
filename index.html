<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .viewer { height: 70vh; width: 100%; display: flex; align-items: center; justify-content: center; }
        img { max-width: 95%; max-height: 100%; border-radius: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .counter { font-size: 20px; margin-bottom: 20px; color: #888; }
        .controls { display: flex; gap: 30px; margin-top: 30px; }
        button { background: #1a1a1a; color: #0088cc; border: 1px solid #333; padding: 15px 35px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button:active { background: #333; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer">
        <img id="main-photo" src="https://i.ibb.co/7xYhRKSN/IMG-7664.jpg">
    </div>

    <div class="controls">
        <button onclick="change(-1)">⬅️</button>
        <button onclick="change(1)">➡️</button>
    </div>

<script>
    const photos = [
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co",
        "https://i.ibb.co"
    ];
    
    let cur = 0;
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');

    function change(dir) {
        cur = (cur + dir + photos.length) % photos.length;
        img.src = photos[cur];
        cnt.innerText = (cur + 1) + " / " + photos.length;
    }
</script>
</body>
</html>
