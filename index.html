<meta name="referrer" content="no-referrer">
<div id="gallery-app">
  <div class="counter" id="counter">1 / 9</div>
  
  <div class="viewer">
    <img id="main-photo" src="https://i.ibb.co" />
  </div>

  <div class="controls">
    <button onclick="prevPhoto()">⬅️ Назад</button>
    <button onclick="nextPhoto()">Вперед ➡️</button>
  </div>
</div>

<script>
  const photos = [
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co",
    "https://i.ibb.co"
  ];
  
  let currentIndex = 0;
  const imgElement = document.getElementById('main-photo');
  const counterElement = document.getElementById('counter');

  function updateGallery() {
    imgElement.src = photos[currentIndex];
    counterElement.innerText = (currentIndex + 1) + " / " + photos.length;
  }

  function nextPhoto() {
    currentIndex = (currentIndex + 1) % photos.length;
    updateGallery();
  }

  function prevPhoto() {
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    updateGallery();
  }
</script>

<style>
  body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  #gallery-app { text-align: center; width: 100%; padding-bottom: 20px; }
  .viewer { height: 75vh; display: flex; align-items: center; justify-content: center; margin: 5px 0; }
  img { max-width: 95%; max-height: 100%; border-radius: 12px; }
  .counter { font-size: 16px; color: #888; font-weight: bold; margin-top: 10px; }
  .controls { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
  button { background: #222; color: #0088cc; border: 1px solid #333; padding: 12px 25px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
  button:active { background: #111; scale: 0.95; }
</style>
