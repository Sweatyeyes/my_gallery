<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
        }

        .counter { 
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #888; font-size: 18px;
            z-index: 10; pointer-events: none;
        }

        .viewer { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }

        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain;
            transition: opacity 0.2s;
            user-select: none;
            -webkit-user-drag: none;
        }

        .controls { 
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 10;
        }

        .download-btn { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 25px; border-radius: 50px; 
            font-size: 14px; backdrop-filter: blur(10px);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer" id="touch-zone">
        <img id="main-photo" src="1.jpeg">
    </div>

    <div class="controls">
        <a id="download-link" class="download-btn" href="1.jpeg" download>💾 Сохранить это фото</a>
    </div>

<script>
    const photos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg"];
    let cur = 0;
    
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');
    const dl = document.getElementById('download-link');
    const zone = document.getElementById('touch-zone');

    let startX = 0;
    let startTime = 0;

    function updateGallery() {
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[cur];
            dl.href = photos[cur];
            dl.download = photos[cur];
            cnt.innerText = (cur + 1) + " / " + photos.length;
            img.onload = () => { img.style.opacity = 1; };
        }, 150);
    }

    zone.addEventListener('touchstart', e => {
        startX = e.changedTouches[0].screenX;
        startTime = new Date().getTime();
    }, false);

    zone.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].screenX;
        const endTime = new Date().getTime();
        const diffX = endX - startX;
        const diffTime = endTime - startTime;

        // Если это быстрый тап (меньше 250мс) и почти без движения пальца
        if (diffTime < 250 && Math.abs(diffX) < 10) {
            const screenWidth = window.innerWidth;
            const clickX = e.changedTouches[0].clientX;

            if (clickX < screenWidth / 3) {
                // Нажатие в левой трети экрана
                change(-1);
            } else if (clickX > (screenWidth * 2) / 3) {
                // Нажатие в правой трети экрана
                change(1);
            }
        } 
        // Иначе проверяем на свайп
        else if (Math.abs(diffX) > 50) {
            if (diffX < 0) change(1); // Свайп влево -> вперед
            else change(-1);          // Свайп вправо -> назад
        }
    }, false);

    function change(dir) {
        cur = (cur + dir + photos.length) % photos.length;
        updateGallery();
    }
</script>
</body>
</html>
