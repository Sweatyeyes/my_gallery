<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Gallery</title>
    <style>
        /* Убираем все отступы и фиксируем экран */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* Счетчик сверху */
        .counter { 
            position: absolute; top: 15px; width: 100%;
            text-align: center; color: #fff; font-family: sans-serif;
            font-size: 16px; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            z-index: 10; pointer-events: none;
        }

        /* Контейнер для фото на весь экран */
        .viewer { 
            flex-grow: 1; display: flex; 
            align-items: center; justify-content: center; 
            width: 100%; height: 100%;
        }

        img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Фото вписывается целиком, не обрезаясь */
            transition: opacity 0.2s;
        }

        /* Кнопки управления снизу */
        .controls { 
            position: absolute; bottom: 30px; 
            width: 100%; display: flex; 
            justify-content: center; gap: 40px; 
            z-index: 10;
        }

        button { 
            background: rgba(40, 40, 40, 0.7); 
            color: #fff; border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px 35px; border-radius: 50px; 
            font-size: 24px; cursor: pointer; 
            backdrop-filter: blur(10px); /* Эффект стекла */
            -webkit-tap-highlight-color: transparent; 
        }
        
        button:active { background: rgba(80, 80, 80, 0.9); transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer" onclick="nextPhoto()"> <!-- Нажатие на фото тоже листает вперед -->
        <img id="main-photo" src="1.jpeg">
    </div>

    <div class="controls">
        <button onclick="event.stopPropagation(); change(-1)">⬅️</button>
        <button onclick="event.stopPropagation(); change(1)">➡️</button>
    </div>

<script>
    const photos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg"];
    let cur = 0;
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');

    function change(dir) {
        img.style.opacity = 0;
        setTimeout(() => {
            cur = (cur + dir + photos.length) % photos.length;
            img.src = photos[cur];
            cnt.innerText = (cur + 1) + " / " + photos.length;
            img.onload = () => { img.style.opacity = 1; };
        }, 150);
    }

    // Для удобства: клик по самому фото листает вперед
    function nextPhoto() { change(1); }
</script>
</body>
</html>
