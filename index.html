<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; /* Вертикальный стек */
        }

        .counter { 
            padding-top: 20px; width: 100%;
            text-align: center; color: #888; font-size: 18px;
            font-weight: bold; z-index: 10;
        }

        .viewer { 
            width: 100%; 
            flex-grow: 1; /* Занимает всё место */
            display: flex; 
            align-items: flex-start; /* Прижимаем фото К ВЕРХУ этого блока */
            justify-content: center;
            touch-action: none;
            padding-top: 10px; /* Отступ от счетчика */
        }

        img { 
            max-width: 100%; 
            max-height: 85%; /* Чтобы не уходило слишком низко к кнопке */
            object-fit: contain;
            transition: opacity 0.2s;
            user-select: none;
            -webkit-user-drag: none;
        }

        .controls { 
            padding-bottom: 40px; 
            width: 100%;
            display: flex; 
            justify-content: center; 
            z-index: 20;
            background: #000; /* Чтобы под кнопкой не было видно фото */
        }

        .download-btn { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 30px; border-radius: 50px; 
            font-size: 15px; backdrop-filter: blur(10px);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer" id="touch-zone">
        <img id="main-photo" src="1.jpeg">
    </div>

    <div class="controls">
        <button class="download-btn" onclick="savePhoto()">💾 Сохранить это фото</button>
    </div>

<script>
    const photos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg"];
    let cur = 0;
    
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');
    const zone = document.getElementById('touch-zone');

    let startX = 0;
    let startTime = 0;

    function updateGallery() {
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[cur];
            cnt.innerText = (cur + 1) + " / " + photos.length;
            img.onload = () => { img.style.opacity = 1; };
        }, 150);
    }

    function change(dir) {
        cur = (cur + dir + photos.length) % photos.length;
        updateGallery();
    }

    function savePhoto() {
        // Открываем фото в новом окне — самый надежный способ для Telegram
        window.open(photos[cur], '_blank');
    }

    zone.addEventListener('touchstart', e => {
        startX = e.changedTouches[0].screenX;
        startTime = new Date().getTime();
    }, false);

    zone.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].screenX;
        const endTime = new Date().getTime();
        const diffX = endX - startX;
        const diffTime = endTime - startTime;

        if (diffTime < 250 && Math.abs(diffX) < 10) {
            const screenWidth = window.innerWidth;
            const clickX = e.changedTouches[0].clientX;
            if (clickX < screenWidth / 3) change(-1);
            else if (clickX > (screenWidth * 2) / 3) change(1);
        } 
        else if (Math.abs(diffX) > 50) {
            if (diffX < 0) change(1);
            else change(-1);
        }
    }, false);
</script>
</body>
</html>
