<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
        }
        .counter { 
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #888; font-size: 18px;
            z-index: 10; pointer-events: none;
        }
        .viewer { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }
        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain;
            transition: opacity 0.2s;
            user-select: none;
            pointer-events: none; /* Чтобы картинка не мешала кликам по зонам */
        }
        .controls { 
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 20;
        }
        .btn-save { 
            background: rgba(255, 255, 255, 0.15); 
            color: #fff; border: 1px solid rgba(255,255,255,0.3); 
            padding: 12px 30px; border-radius: 50px; 
            font-size: 15px; backdrop-filter: blur(10px);
            cursor: pointer; font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer" id="main-zone">
        <img id="main-photo" src="1.jpeg">
    </div>

    <div class="controls">
        <button class="btn-save" onclick="savePhoto()">📥 Сохранить фото</button>
    </div>

<script>
    const photos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg"];
    let cur = 0;
    
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');
    const zone = document.getElementById('main-zone');

    let startX = 0;
    let isMoving = false;

    function updateGallery() {
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[cur];
            cnt.innerText = (cur + 1) + " / " + photos.length;
            img.onload = () => { img.style.opacity = 1; };
        }, 150);
    }

    function change(dir) {
        cur = (cur + dir + photos.length) % photos.length;
        updateGallery();
    }

    // Обработка касаний
    zone.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        isMoving = false;
    }, false);

    zone.addEventListener('touchmove', e => {
        isMoving = true; // Если палец двигается — это свайп, а не тап
    }, false);

    zone.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        const diffX = endX - startX;

        if (isMoving) {
            // ЛОГИКА СВАЙПА
            if (Math.abs(diffX) > 50) {
                if (diffX < 0) change(1); // Влево -> Вперед
                else change(-1);          // Вправо -> Назад
            }
        } else {
            // ЛОГИКА ТАПА (Клик по краям)
            const screenWidth = window.innerWidth;
            if (endX < screenWidth / 3) {
                change(-1);
            } else if (endX > (screenWidth * 2) / 3) {
                change(1);
            }
        }
    }, false);

    function savePhoto() {
        window.open(photos[cur], '_blank');
    }
</script>
</body>
</html>
