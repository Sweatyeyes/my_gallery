<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: -apple-system, sans-serif;
        }

        /* Счетчик сверху */
        .counter { 
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: #888; font-size: 18px;
            z-index: 10; pointer-events: none;
        }

        /* Контейнер для фото */
        .viewer { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }

        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain;
            transition: transform 0.3s ease-out, opacity 0.2s;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Кнопка скачать снизу */
        .controls { 
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; z-index: 10;
        }

        .download-btn { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 25px; border-radius: 50px; 
            font-size: 14px; backdrop-filter: blur(10px);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="counter" id="counter">1 / 9</div>
    
    <div class="viewer" id="touch-zone">
        <img id="main-photo" src="1.jpeg">
    </div>

    <div class="controls">
        <a id="download-link" class="download-btn" href="1.jpeg" download>💾 Сохранить это фото</a>
    </div>

<script>
    const photos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg", "6.jpeg", "7.jpeg", "8.jpeg", "9.jpeg"];
    let cur = 0;
    
    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');
    const dl = document.getElementById('download-link');
    const zone = document.getElementById('touch-zone');

    let touchStartX = 0;
    let touchEndX = 0;

    function updateGallery() {
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[cur];
            dl.href = photos[cur];
            dl.download = photos[cur];
            cnt.innerText = (cur + 1) + " / " + photos.length;
            img.onload = () => { img.style.opacity = 1; };
        }, 150);
    }

    // Логика свайпов
    zone.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, false);

    zone.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, false);

    function handleSwipe() {
        const swipeDistance = touchEndX - touchStartX;
        const threshold = 50; // Чувствительность свайпа

        if (swipeDistance < -threshold) {
            // Свайп влево -> Следующее фото
            cur = (cur + 1) % photos.length;
            updateGallery();
        } else if (swipeDistance > threshold) {
            // Свайп вправо -> Предыдущее фото
            cur = (cur - 1 + photos.length) % photos.length;
            updateGallery();
        }
    }
</script>
</body>
</html>
